name: Release Automation Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          # Define required build-time variables (they can be dummies for purely static/standalone tracing)
          DATABASE_URL: mysql://dummy:dummy@localhost:3306/dummy
          NEXTAUTH_SECRET: dummy-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: Bump Version and Push Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          generate_release_notes: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tashtep-standalone
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 7

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-release
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: tashtep-standalone

      - name: Deploy Script (Placeholder)
        run: |
          echo "Deploying ${{ needs.build-and-release.outputs.new_tag }} to Staging Environment..."
          echo "Insert your SSH, Docker, or Vercel deployment commands here."
          # Example: rsync -avz . user@staging-server:/var/www/tashtep
          # ssh user@staging-server 'pm2 restart tashtep'

  smoke-test:
    name: Smoke Test (Staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright Tests Against Staging
        run: npx playwright test
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.STAGING_URL }} # Requires configuration

  deploy-production:
    name: Deploy to Production
    needs: smoke-test
    runs-on: ubuntu-latest
    environment:
      name: production
      # To enforce manual approval, go to Settings -> Environments -> production -> Require reviewers
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: tashtep-standalone

      - name: Deploy Script (Placeholder)
        run: |
          echo "Deploying to Production Environment..."
          echo "Insert your SSH, Docker, or Vercel deployment commands here."
