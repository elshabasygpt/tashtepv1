<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tashtep Product Card</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&amp;family=Tajawal:wght@400;500;700&amp;family=IBM+Plex+Sans+Arabic:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#474646",
                        "surface-bright": "#f9f9f7",
                        "surface-container-highest": "#e2e3e1",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#6b3b00",
                        "surface-variant": "#e2e3e1",
                        "secondary-fixed": "#e5e2e1",
                        "surface-dim": "#dadad8",
                        "surface-container": "#eeeeec",
                        "inverse-surface": "#2f3130",
                        "outline": "#877363",
                        "gallery-white": "#FFFFFF",
                        "primary-fixed-dim": "#ffb875",
                        "surface-container-high": "#e8e8e6",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#f1f1ef",
                        "on-primary": "#ffffff",
                        "tashtep-orange": "#F39223",
                        "surface-tint": "#8d4f00",
                        "background": "#f9f9f7",
                        "primary-container": "#f39223",
                        "on-primary-container": "#5e3300",
                        "on-primary-fixed": "#2d1600",
                        "on-tertiary-container": "#3d3e42",
                        "surface": "#f9f9f7",
                        "secondary-fixed-dim": "#c8c6c5",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#544435",
                        "primary-fixed": "#ffdcc0",
                        "primary": "#8d4f00",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-error": "#ffffff",
                        "secondary": "#5f5e5e",
                        "tertiary-container": "#a9a9ae",
                        "tertiary-fixed": "#e3e2e7",
                        "tertiary-fixed-dim": "#c7c6cb",
                        "tertiary": "#5d5e63",
                        "on-surface": "#1a1c1b",
                        "surface-container-low": "#f4f4f2",
                        "stone": "#F8F8F9",
                        "on-tertiary-fixed-variant": "#46464b",
                        "secondary-container": "#e5e2e1",
                        "on-secondary": "#ffffff",
                        "obsidian": "#111111",
                        "outline-variant": "#dac2af",
                        "charcoal": "#333333",
                        "on-tertiary-fixed": "#1a1b1f",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#656464",
                        "inverse-primary": "#ffb875",
                        "on-background": "#1a1c1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem"
                    },
                    "spacing": {
                        "micro-md": "16px",
                        "macro-sm": "32px",
                        "gutter": "24px",
                        "container-max": "1440px",
                        "macro-md": "64px",
                        "macro-lg": "128px",
                        "micro-xs": "4px",
                        "micro-sm": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Cairo"],
                        "display-hero-mobile": ["Cairo"],
                        "body-lg": ["Tajawal"],
                        "technical-mono": ["IBM Plex Sans Arabic"],
                        "display-hero": ["Cairo"],
                        "body-md": ["Tajawal"],
                        "label-md": ["Tajawal"],
                        "headline-lg-mobile": ["Cairo"],
                        "headline-lg": ["Cairo"]
                    },
                    "fontSize": {
                        "headline-md": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-hero-mobile": ["48px", { "lineHeight": "1.1", "fontWeight": "300" }],
                        "body-lg": ["20px", { "lineHeight": "1.7", "fontWeight": "400" }],
                        "technical-mono": ["13px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "400" }],
                        "display-hero": ["80px", { "lineHeight": "1.1", "letterSpacing": "0", "fontWeight": "300" }],
                        "body-md": ["16px", { "lineHeight": "1.625", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "headline-lg-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "400" }],
                        "headline-lg": ["48px", { "lineHeight": "1.2", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .product-card-hover:hover .quick-add-overlay {
            opacity: 1;
            transform: translateY(0);
        }
        .product-card-hover:hover .product-image {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-gutter">
<!-- Standalone Premium Product Card -->
<div class="group relative w-full max-w-[340px] bg-gallery-white rounded-2xl overflow-hidden border border-stone transition-shadow duration-300 hover:shadow-[0_10px_40px_rgba(0,0,0,0.04)] product-card-hover flex flex-col cursor-pointer hover:-translate-y-1 transition-transform" style="background-color: #FAFAF8;">
<!-- Image Section (70% approx, using aspect ratio) -->
<div class="relative w-full aspect-[4/5] bg-stone overflow-hidden"><div class="absolute top-4 right-4 z-10 flex flex-col gap-2"><span class="bg-obsidian text-on-primary text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full shadow-sm">جديد</span><span class="bg-tashtep-orange text-on-primary text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full shadow-sm">الأكثر مبيعاً</span><span class="bg-error text-on-primary text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full shadow-sm">خصم 15%</span></div>
<img class="w-full h-full object-cover transition-transform duration-[180ms] ease-out product-image group-hover:scale-[1.02]" data-alt="A highly detailed, vertically oriented editorial photograph of a luxury home finishing product, such as a beautifully textured ceramic tile or a sleek matte black faucet. The setting is a minimalist, warm-lit studio environment with dramatic, Zara Home-style diffuse lighting. Soft shadows enhance the tactile quality of the material. The aesthetic is clean, sophisticated, and premium, reflecting modern Arabic interior design sensibilities." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAZruJqVoYkZsKGduXsi-1HaxXGtNWVw2uzN9Kpr3s0UZN86FLApYaVvV51ploEs8uqLjCEVsi0zWrM-0C0b42XOpC73t64836zYzAUHj3BX1BqM9QhAHDRuf7OAVShz63sOQD7f67opNtAlMq3i9-cE0SpYmr_jQmp34rdn5e6zKDlpuBNtct8NQXjQeD_Wr3Ach1y9FTLgxTSVaT7ZE2L0IvPzcrmZZeZ9YBxrGhJVo7hj9dBs4oKlW5X0-ywhjOgU8X-k-xrTv8"/>
<!-- Floating Wishlist Button -->
<button aria-label="Add to wishlist" class="absolute top-micro-md left-micro-md w-10 h-10 bg-gallery-white rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform duration-200 z-10 bg-white/70 backdrop-blur-md border border-white/20">
<span class="material-symbols-outlined text-charcoal text-[20px] transition-colors duration-200 hover:text-tashtep-orange">favorite</span>
</button>
<!-- Quick Add Overlay (Hidden by default, slides up on hover) -->
<div class="absolute bottom-0 left-0 w-full p-micro-md opacity-0 translate-y-4 transition-all duration-300 ease-out quick-add-overlay z-10 bg-gradient-to-t from-obsidian/40 to-transparent">
<button class="w-full bg-tashtep-orange text-on-primary font-label-md text-label-md py-3 rounded-DEFAULT hover:opacity-90 transition-opacity duration-200 flex items-center justify-center gap-2 h-12 min-h-[44px] rounded-lg shadow-md">
<span class="material-symbols-outlined text-[18px]">shopping_cart</span>
<span>أضف للسلة</span>
</button>
</div>
</div>
<!-- Content Section -->
<div class="p-gutter flex flex-col gap-micro-xs flex-grow justify-between">
<div>
<!-- Brand / Category -->
<p class="font-body-md text-[13px] text-tertiary-container uppercase tracking-wider mb-1">سيراميكا كليوباترا</p>
<!-- Product Name -->
<h3 class="font-headline-md text-[18px] text-obsidian leading-tight line-clamp-2 mb-2">
                    بورسلين إسباني فاخر مطفي - رمادي داكن ٦٠×١٢٠
                </h3>
</div>
<div class="flex items-end justify-between mt-micro-md">
<!-- Price -->
<div class="flex flex-col">
<span class="font-technical-mono text-[12px] text-secondary line-through">٤٥٠ ج.م</span>
<div class="flex items-baseline gap-1 text-obsidian"><span class="font-headline-md text-[28px] font-bold">٣٨٥</span><span class="font-body-md text-[14px] font-bold">ج.م / م٢</span></div>
</div>
<!-- Rating -->
<div class="flex items-center gap-1"><div class="flex items-center gap-0.5 text-tashtep-orange"><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">star</span><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">star</span><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">star</span><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">star</span><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">star</span></div><span class="font-technical-mono text-[12px] text-secondary">4.8 (126)</span></div>
</div>
</div>
</div>
</body></html>
