version: '3.8'

services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tashtep-next-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
      - PAYMOB_API_KEY=${PAYMOB_API_KEY}
      - PAYMOB_IFRAME_ID=${PAYMOB_IFRAME_ID}
      - PAYMOB_INTEGRATION_ID=${PAYMOB_INTEGRATION_ID}
      - RESEND_API_KEY=${RESEND_API_KEY}
    networks:
      - tashtep-network
    depends_on:
      postgres-db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - next-app
    networks:
      - tashtep-network

  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: tashtep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tashtep-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d tashtep"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  tashtep-network:
    driver: bridge

volumes:
  postgres_data:
